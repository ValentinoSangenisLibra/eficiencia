</script>
<style>
  :root{
    --cc-red:#F40000; --cc-red-dark:#D10000; --andina-gray:#8A8D8F; --andina-blue:#5BB4E5;
    --green:#1E9E3A; --amber:#E8A400; --red:#C0304A; --track:#EDE7E4; --ink:#5F5E5A;
    --bg:#F6F3ED; --card:#FFFFFF; --border:#E4E0D7; --text:#2C2C2A; --muted:#6C6B66;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif; background:var(--bg); color:var(--text);
    display:flex; flex-direction:column; min-height:100vh;}
  .brandbar{background:linear-gradient(135deg,#F40000 0%,#D10000 100%); color:#fff; flex:0 0 auto;}
  .brandbar-inner{display:flex; align-items:center; justify-content:space-between; padding:12px 18px; gap:12px; flex-wrap:wrap;}
  .brand-left{display:flex; align-items:center; gap:14px;}
  .brand-left img{height:50px; background:#fff; border-radius:8px; padding:4px 8px;}
  .brand-title h1{font-size:22px; font-weight:700; line-height:1.15;}
  .brand-title p{font-size:12px; opacity:.92;}
  .brand-right{display:flex; align-items:center; gap:14px; flex-wrap:wrap;}
  .marcas-inline{display:flex; align-items:center; gap:12px; background:rgba(255,255,255,.95); border-radius:10px; padding:6px 10px;}
  .marcas-inline img{height:24px;}
  .topbtn{font-family:inherit; cursor:pointer; border:1px solid rgba(255,255,255,.6); background:rgba(255,255,255,.16); color:#fff; border-radius:8px; padding:8px 12px; font-size:14px; white-space:nowrap;}
  .topbtn:hover{background:rgba(255,255,255,.3);}

  /* selector de linea en barra */
  .lineabar{background:#fff; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:center; gap:8px; padding:8px; flex-wrap:wrap;}
  .lineabar .lbl{font-size:12px; color:var(--muted); margin-right:4px;}
  .chip{font-family:inherit; cursor:pointer; border:1.5px solid var(--border); background:#fff; color:var(--text); border-radius:20px; padding:6px 16px; font-size:14px; font-weight:600;}
  .chip.active{background:var(--cc-red); color:#fff; border-color:var(--cc-red);}
  .chip.todas{border-style:dashed;}
  .chip.todas.active{background:var(--ink); border-color:var(--ink);}
  .chip.excel{background:#217346; color:#fff; border-color:#217346; text-decoration:none; display:inline-flex; align-items:center;}
  .chip.excel:hover{background:#1a5c38;}

  .daylabel{text-align:center; font-size:13px; color:var(--muted); text-transform:capitalize; padding:8px 0 0;}
  main{flex:1 1 auto; display:flex; flex-direction:column; padding:10px 16px 16px; gap:12px;}
  .gauges{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  .card{background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px 16px; box-shadow:0 1px 4px rgba(0,0,0,.05);}
  .card.day{border-top:5px solid var(--andina-blue);}
  .card.month{border-top:5px solid var(--cc-red);}
  .card-head{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
  .card-title{font-size:16px; font-weight:600;}
  .card-date{font-size:12px; color:var(--muted); text-transform:capitalize;}
  .dist{text-align:right; line-height:1.25;}
  .dist .big{font-size:18px; font-weight:700;}
  .dist .lbl{font-size:11px; color:var(--muted);}
  .gauge-row{display:flex; align-items:center; gap:12px; margin-top:4px;}
  .gauge-wrap{flex:0 0 46%; position:relative;}
  .gauge-wrap canvas{display:block; width:100%;}
  .kpis{flex:1 1 auto; display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  .kpi{background:var(--bg); border-radius:8px; padding:7px 6px; text-align:center;}
  .kpi .v{font-size:15px; font-weight:700;}
  .kpi .l{font-size:10px; color:var(--muted);}
  .chart-card{background:var(--card); border:1px solid var(--border); border-radius:14px; padding:12px 16px; box-shadow:0 1px 4px rgba(0,0,0,.05); flex:1 1 auto; display:flex; flex-direction:column; min-height:280px;}
  .chart-card h2{font-size:15px; font-weight:600; margin-bottom:6px;}
  .chart-wrap{position:relative; flex:1 1 auto; min-height:240px;}
  .empty-hint{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:14px; text-align:center; padding:20px;}
  footer{text-align:center; font-size:11px; color:var(--muted); padding:0 0 10px;}

  /* VISTA TODAS LAS LINEAS */
  .todas-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:12px;}
  .mini{background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px; text-align:center; box-shadow:0 1px 4px rgba(0,0,0,.05);}
  .mini h3{font-size:15px; font-weight:700; margin-bottom:2px;}
  .mini .sub{font-size:11px; color:var(--muted); margin-bottom:6px;}
  .mini-row{display:flex; gap:6px;}
  .mini-col{flex:1;}
  .mini-col .cap{font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px;}
  .mini-col .val{font-size:20px; font-weight:700; line-height:1.2;}
  .mini-col .obj{font-size:10px; color:var(--muted);}
  .mini .sindata{color:var(--muted); font-size:12px; padding:16px 0;}
  .mini-excel{display:inline-block; margin-top:8px; background:#217346; color:#fff; text-decoration:none; border-radius:8px; padding:6px 12px; font-size:12px; font-weight:600;}
  .mini-excel:hover{background:#1a5c38;}

  /* SELECTOR INICIAL */
  .picker{position:fixed; inset:0; background:linear-gradient(135deg,#F40000 0%,#8B0000 100%); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;}
  .picker-box{background:#fff; border-radius:20px; padding:36px 32px; max-width:520px; width:100%; text-align:center; box-shadow:0 10px 40px rgba(0,0,0,.3);}
  .picker-box img{height:60px; margin-bottom:16px;}
  .picker-box h2{font-size:24px; font-weight:700; margin-bottom:6px;}
  .picker-box p{font-size:14px; color:var(--muted); margin-bottom:24px;}
  .picker-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:14px;}
  .picker-grid button{font-family:inherit; cursor:pointer; border:2px solid var(--border); background:#fff; border-radius:14px; padding:20px 8px; font-size:26px; font-weight:700; color:var(--text); transition:.15s;}
  .picker-grid button:hover{border-color:var(--cc-red); background:#fff5f5; transform:translateY(-2px);}
  .picker-all{font-family:inherit; cursor:pointer; width:100%; border:2px dashed var(--border); background:#fff; border-radius:14px; padding:14px; font-size:15px; font-weight:600; color:var(--muted);}
  .picker-all:hover{border-color:var(--ink); color:var(--text);}

  /* MODO TELE */
  body.tv{height:100vh; overflow:hidden;}
  body.tv .brandbar-inner{padding:1.4vh 1.8vw;}
  body.tv .brand-left img{height:7vh;}
  body.tv .brand-title h1{font-size:3.4vh;}
  body.tv .brand-title p{font-size:1.8vh;}
  body.tv .marcas-inline img{height:3.4vh;}
  body.tv .lineabar{padding:0.8vh;}
  body.tv .chip{font-size:1.8vh; padding:0.7vh 1.4vw;}
  body.tv .daylabel{font-size:1.9vh;}
  body.tv main{padding:1.2vh 1.8vw; gap:1.2vh; min-height:0;}
  body.tv .card{border-radius:1.4vh; padding:1.4vh 1.4vw;}
  body.tv .card-title{font-size:2.5vh;}
  body.tv .card-date{font-size:1.6vh;}
  body.tv .dist .big{font-size:2.6vh;}
  body.tv .dist .lbl{font-size:1.4vh;}
  body.tv .kpi .v{font-size:2.4vh;}
  body.tv .kpi .l{font-size:1.4vh;}
  body.tv .chart-card{border-radius:1.4vh; padding:1.2vh 1.4vw; min-height:0;}
  body.tv .chart-card h2{font-size:2.2vh;}
  body.tv .chart-wrap{min-height:0;}
  body.tv footer{font-size:1.2vh;}
  body.tv .mini h3{font-size:2.6vh;}
  body.tv .mini-col .val{font-size:3.4vh;}
  body.tv .mini-col .cap{font-size:1.4vh;}
  body.tv .mini-col .obj{font-size:1.4vh;}

  @media (max-width:720px){
    .gauges{grid-template-columns:1fr;}
    .gauge-row{flex-direction:column; gap:10px;}

<div class="lineabar" id="lineabar"></div>
<div class="daylabel" id="mesLabel"></div>

<main>
  <div id="vistaTodas" style="display:none;"></div>
  <div id="vistaUna" style="display:flex; flex-direction:column; gap:12px; flex:1 1 auto; min-height:0;">
    <div class="gauges">
      <div class="card day">
        <div class="card-head">
          <div>
            <div class="card-title">Eficiencia del día anterior</div>
            <div class="card-date" id="diaFecha">—</div>
          </div>
          <div class="dist" id="diaDist"></div>
        </div>
        <div class="gauge-row">
          <div class="gauge-wrap"><canvas id="gaugeDia"></canvas></div>
          <div class="kpis" id="kpiDia"></div>
        </div>
      </div>
      <div class="card month">
        <div class="card-head">
          <div>
            <div class="card-title">Eficiencia del mes</div>
            <div class="card-date" id="mesFecha">—</div>
          </div>
          <div class="dist" id="mesDist"></div>
        </div>
        <div class="gauge-row">
          <div class="gauge-wrap"><canvas id="gaugeMes"></canvas></div>
          <div class="kpis" id="kpiMes"></div>
        </div>
      </div>
    </div>
    <div class="chart-card">
      <h2>Evolución del mes</h2>
      <div class="chart-wrap">
        <canvas id="chartEvo"></canvas>
        <div class="empty-hint" id="emptyHint"></div>
      </div>
    </div>
  </div>
  <footer>Coca-Cola Andina Argentina · Datos desde Power BI (AR-CBA-Productividad) · <span id="upd"></span></footer>
</main>

<script>

const GREEN='#1E9E3A', AMBER='#E8A400', RED='#C0304A', BLUE='#5BB4E5', CCRED='#F40000', TRACK='#EDE7E4', INK='#5F5E5A';
const LINEAS=['20','21','24','25','26'];
let store={};      // { "20": [ {fecha,...}, ... ], "21": [...] }
let lineaActual=null;
let vistaTodas=false;

function semColor(real,obj){
  if(obj==null||real==null) return INK;
  const d=real-obj;
  if(d>=0) return GREEN;
  if(d>=-2) return AMBER;
  return RED;
}
const nf=new Intl.NumberFormat('es-AR');
const fmt=n=>(n==null||n==='')?'—':nf.format(n);
const pct=n=>(n==null)?'—':(Math.round(n*100)/100).toFixed(2)+' %';
const fecha=f=>new Date(f+'T00:00:00');
function datosLinea(l){ return (store[l]||[]).slice().sort((a,b)=>a.fecha.localeCompare(b.fecha)); }
function ultimo(l){ const d=datosLinea(l); return d.length?d[d.length-1]:null; }

function drawGauge(cid, real, obj){
  const cv=document.getElementById(cid); if(!cv) return;
  const color=semColor(real,obj);
  const wrap=cv.parentElement;
  const dpr=window.devicePixelRatio||1;
  const W=wrap.clientWidth||300, H=W*0.60;
  cv.width=W*dpr; cv.height=H*dpr; cv.style.width='100%'; cv.style.height=H+'px';
  const x=cv.getContext('2d'); x.setTransform(dpr,0,0,dpr,0,0); x.clearRect(0,0,W,H);
  const cx=W/2, cy=H-H*0.10, r=Math.min(W/2-W*0.06, H*0.82), lw=W*0.075;
  const A0=Math.PI, A1=2*Math.PI, val=Math.max(0,Math.min(100,real||0)), end=A0+(A1-A0)*(val/100);
  x.lineCap='round';
  x.beginPath(); x.strokeStyle=TRACK; x.lineWidth=lw; x.arc(cx,cy,r,A0,A1); x.stroke();
  if(real!=null && real>0){ x.beginPath(); x.strokeStyle=color; x.lineWidth=lw; x.arc(cx,cy,r,A0,end); x.stroke(); }
  if(obj!=null){
    const oa=A0+(A1-A0)*(Math.max(0,Math.min(100,obj))/100);
    x.beginPath(); x.strokeStyle=INK; x.lineWidth=lw*0.13;
    x.moveTo(cx+Math.cos(oa)*(r-lw/2-3),cy+Math.sin(oa)*(r-lw/2-3));
    x.lineTo(cx+Math.cos(oa)*(r+lw/2+3),cy+Math.sin(oa)*(r+lw/2+3)); x.stroke();
    x.fillStyle=INK; x.font=(W*0.052)+'px sans-serif'; x.textAlign='center';
    x.fillText(pct(obj), cx+Math.cos(oa)*(r+W*0.085), cy+Math.sin(oa)*(r+W*0.085)-2);
  }
  x.fillStyle=INK; x.font='600 '+(W*0.12)+'px sans-serif'; x.textAlign='center';
  x.fillText((real!=null&&real>0)?pct(real):'—', cx, cy-H*0.12);
}
function distHTML(real,obj){
  if(obj==null||real==null) return '';
  const d=Math.round((real-obj)*100)/100, col=semColor(real,obj);
  return '<div class="big" style="color:'+col+'">'+(d>0?'+':'')+d.toFixed(2)+' %</div><div class="lbl">Distancia a objetivo</div>';
}
function kpiHTML(items){
  return items.map(k=>'<div class="kpi"><div class="v">'+fmt(k[1])+'</div><div class="l">'+k[0]+'</div></div>').join('');
}
let chart;
function drawChart(){
  try{
    if(typeof Chart==='undefined') return;
    const d=datosLinea(lineaActual);
    const labels=d.map(x=>fecha(x.fecha).toLocaleDateString('es-AR',{day:'numeric',month:'numeric'}));
    if(chart){ chart.destroy(); chart=null; }
    const cv=document.getElementById('chartEvo'); if(!cv) return;
    chart=new Chart(cv,{
      type:'line',
      data:{labels,datasets:[
        {label:'Efic. dia',data:d.map(x=>x.diaEf),borderColor:BLUE,backgroundColor:BLUE,tension:.3,borderWidth:3,pointRadius:4,pointStyle:'circle'},
        {label:'Efic. mes',data:d.map(x=>x.mesEf),borderColor:CCRED,backgroundColor:CCRED,tension:.3,borderWidth:3,pointRadius:4,pointStyle:'rect'},
        {label:'Objetivo mes',data:d.map(x=>x.mesObj),borderColor:INK,borderDash:[6,5],borderWidth:2,pointRadius:0,tension:.3}
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:true,labels:{boxWidth:14,usePointStyle:true,font:{size:13},color:INK,padding:12}},
          tooltip:{callbacks:{label:c=>c.dataset.label+': '+(c.parsed.y==null?'-':c.parsed.y.toFixed(2)+' %')}}},
        scales:{y:{ticks:{callback:v=>v+' %',color:INK},grid:{color:'#e6e3db'}},x:{ticks:{color:INK},grid:{display:false}}}}
    });
  }catch(e){ console.warn('chart error', e); }
}
function renderChips(){
  const bar=document.getElementById('lineabar'); if(!bar) return;
  let h='<span class="lbl">Línea</span>';
  LINEAS.forEach(l=>{
    h+='<button class="chip'+(!vistaTodas&&lineaActual===l?' active':'')+'" onclick="verLinea(\''+l+'\')">'+l+'</button>';
  });
  h+='<button class="chip todas'+(vistaTodas?' active':'')+'" onclick="verTodas()">Ver las 5</button>';
  // boton planilla Excel de la linea actual (solo en vista individual)
  if(!vistaTodas && lineaActual){
    const url=(store._links&&store._links[lineaActual])?store._links[lineaActual]:'';
    if(url){ h+='<a class="chip excel" href="'+url+'" target="_blank" rel="noopener">📊 Ver planilla</a>'; }
  }
  bar.innerHTML=h;
}
function renderTodas(){
  const cont=document.getElementById('vistaTodas');
  let h='<div class="todas-grid">';
  LINEAS.forEach(l=>{
    const u=ultimo(l);
    h+='<div class="mini"><h3>Línea '+l+'</h3>';
    if(!u){ h+='<div class="sindata">Sin datos cargados</div></div>'; return; }
    h+='<div class="sub">'+fecha(u.fecha).toLocaleDateString('es-AR')+'</div><div class="mini-row">';
    h+='<div class="mini-col"><div class="cap">Día ant.</div><div class="val" style="color:'+semColor(u.diaEf,u.diaObj)+'">'+pct(u.diaEf)+'</div><div class="obj">obj '+pct(u.diaObj)+'</div></div>';
    h+='<div class="mini-col"><div class="cap">Mes</div><div class="val" style="color:'+semColor(u.mesEf,u.mesObj)+'">'+pct(u.mesEf)+'</div><div class="obj">obj '+pct(u.mesObj)+'</div></div>';
    h+='</div>';
    const lk=(store._links&&store._links[l])?store._links[l]:'';
    if(lk){ h+='<a class="mini-excel" href="'+lk+'" target="_blank" rel="noopener">📊 Ver planilla</a>'; }
    h+='</div>';
  });
  h+='</div>';
  cont.innerHTML=h;
}
function render(){
  renderChips();
  const vTodas=document.getElementById('vistaTodas');
  const vUna=document.getElementById('vistaUna');
  if(vistaTodas){
    vTodas.style.display='block'; vUna.style.display='none';
    document.getElementById('mesLabel').textContent='Comparativa de las 5 líneas';
    renderTodas();
    return;
  }
  vTodas.style.display='none'; vUna.style.display='flex';
  const d=datosLinea(lineaActual);
  const hint=document.getElementById('emptyHint');
  if(!d.length){
    document.getElementById('mesLabel').textContent='Línea '+lineaActual+' — sin datos';
    document.getElementById('diaFecha').textContent='—';
    document.getElementById('mesFecha').textContent='—';
    document.getElementById('diaDist').innerHTML='';
    document.getElementById('mesDist').innerHTML='';
    drawGauge('gaugeDia',null,null); drawGauge('gaugeMes',null,null);
    document.getElementById('kpiDia').innerHTML=kpiHTML([['Ganado',null],['Paradas',null],['Declarado',null],['Volumen',null]]);
    document.getElementById('kpiMes').innerHTML=kpiHTML([['Ganado',null],['Paradas',null],['Declarado',null],['Volumen',null]]);
    if(chart){ chart.destroy(); chart=null; }
    if(hint){ hint.style.display='flex'; hint.innerHTML=EMPTY_MSG; }
    return;
  }
  if(hint) hint.style.display='none';
  const last=d[d.length-1];
  document.getElementById('mesLabel').textContent='Línea '+lineaActual+' · '+fecha(last.fecha).toLocaleDateString('es-AR',{month:'long',year:'numeric'});
  document.getElementById('diaFecha').textContent=fecha(last.fecha).toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'short'});
  document.getElementById('mesFecha').textContent='al '+fecha(last.fecha).toLocaleDateString('es-AR',{day:'numeric',month:'short'});
  document.getElementById('diaDist').innerHTML=distHTML(last.diaEf,last.diaObj);
  document.getElementById('mesDist').innerHTML=distHTML(last.mesEf,last.mesObj);
  drawGauge('gaugeDia',last.diaEf,last.diaObj);
  drawGauge('gaugeMes',last.mesEf,last.mesObj);
  document.getElementById('kpiDia').innerHTML=kpiHTML([['Ganado',last.diaTG],['Paradas',last.diaTP],['Declarado',last.diaTD],['Volumen',last.diaVOL]]);
  document.getElementById('kpiMes').innerHTML=kpiHTML([['Ganado',last.mesTG],['Paradas',last.mesTP],['Declarado',last.mesTD],['Volumen',last.mesVOL]]);
  const upd=document.getElementById('upd'); if(upd) upd.textContent='Actualizado: '+fecha(last.fecha).toLocaleDateString('es-AR');
  drawChart();
}
function verLinea(l){
  lineaActual=l; vistaTodas=false;
  document.getElementById('picker').style.display='none';
  render();
}
function verTodas(){
  vistaTodas=true;
  document.getElementById('picker').style.display='none';
  render();
}


const EMPTY_MSG='No hay datos publicados para esta línea todavía.';
async function init(){
  try{
    const r=await fetch('datos.json?v='+Date.now());
    if(!r.ok) throw new Error('no datos.json');
    const j=await r.json();
    store = (j && !Array.isArray(j)) ? j : {};
  }catch(e){ store={}; console.warn('No se pudo cargar datos.json', e); }
  LINEAS.forEach(l=>{ if(!store[l]) store[l]=[]; });
  // si ya eligio linea, re-render manteniendo seleccion
  if(lineaActual||vistaTodas) render();
}
// URL params: ?tv  -> modo tele | ?linea=20 -> abre directo esa linea | ?todas -> vista comparativa
(function(){
  const p=new URLSearchParams(location.search);
  if(p.has('tv')) document.body.classList.add('tv');
  init().then(()=>{
    const l=p.get('linea');
    if(p.has('todas')){ verTodas(); }
    else if(l && LINEAS.includes(l)){ verLinea(l); }
  });
})();
let rt; window.addEventListener('resize',()=>{ clearTimeout(rt); rt=setTimeout(()=>{ if(lineaActual||vistaTodas) render(); },150); });
setInterval(init, 600000);

</script>
</body>
